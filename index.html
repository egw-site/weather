<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toshima Weather Brief</title>
<style>
  :root { --navy:#13395e; }
  body{font-family:"Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;margin:0;background:#eef2f5;color:#22323f;}
  header{background:var(--navy);color:#fff;padding:14px 20px;}
  header h1{margin:0;font-size:18px;} header p{margin:4px 0 0;font-size:12px;color:#cfe0f0;}
  .bar{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #dde3e9;position:sticky;top:0;}
  button{font-size:15px;padding:10px 18px;border:none;border-radius:8px;background:var(--navy);color:#fff;cursor:pointer;}
  button.sub{background:#fff;color:var(--navy);border:2px solid var(--navy);}
  button:disabled{opacity:.5;cursor:default;}
  #status{display:block;font-size:15px;font-weight:bold;padding:12px 20px;background:#eaf0f6;color:#13395e;border-bottom:1px solid #dde3e9;}
  #status.work{background:#fff5e0;color:#8a5a00;}
  #status.ok{background:#e7f6ec;color:#1f7a3d;}
  #status.err{background:#fde6e6;color:#b3261e;}
  .wrap{display:flex;justify-content:center;padding:18px;}
  canvas{width:min(96vw,560px);height:auto;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.12);border-radius:6px;}
  .note{max-width:780px;margin:0 auto 30px;padding:0 20px;font-size:13px;color:#56697a;line-height:1.7;}
  code{background:#e7ecf1;padding:1px 5px;border-radius:4px;}
</style>
</head>
<body>
<header>
  <h1>Toshima Weather Brief</h1>
  <p>風・台風の状況図を作成（インストール不要）｜Wind: Open-Meteo (JMA model) ／ Typhoon: JMA</p>
</header>
<div class="bar">
  <button id="go">最新の状況を取得して画像を作成</button>
  <button id="save" class="sub" disabled>画像を保存（PNG）</button>
</div>
<div id="status">準備完了（ver.7.7 平常時を明るく）。上のボタンを押してください。</div>
<div class="wrap"><canvas id="cv" width="1000" height="1000"></canvas></div>
<div class="note">
  使い方：ダブルクリックでEdgeで開く →「最新の状況を取得して画像を作成」→「画像を保存（PNG）」。
  風はJMAモデルの実データを面的に取得し、流線（曲線の矢印）で表示します。初回は精細な海岸線も取得します（数十秒かかる場合あり）。
  画像内の表記は英語のみです。<br>※本校位置はソース冒頭 <code>SCHOOL</code> で変更できます。
</div>

<script>
// ============ 設定 ============
const SCHOOL_NAME = "";
const SCHOOL = { lon:139.715, lat:35.726, name:"Toshima" };
const DEFAULT_LON = [131.0, 145.0];
const DEFAULT_LAT = [32.0, 42.5];
const BRAND_NAME = "Toshima Weather Brief";
const C = { now:"#ff2b3d", fore:"#ffcc33", track:"#000000", school:"#19c463",
            storm:"#ff2b3d", land:"#d7d0c0", navy:"#13395e" };
let NORM_MAX = 40;   // 相対スケール上限（描画前に自動設定）
const SHOW_WIND_FIELD = false; // 背景の風色場（半透明）を表示するか。trueで復活
const WIND_GAMMA = 0.42;          // <1で弱風側を引き伸ばす（1m/sでも色が付く）
function tOf(v){ return Math.pow(Math.min(1,Math.max(0,v/NORM_MAX)), WIND_GAMMA); }
const SHOW_ARROWHEADS = false;   // 風を矢印ではなく線だけにする場合 false

const JMA_TARGET = "https://www.jma.go.jp/bosai/typhoon/data/targetTc.json";
const JMA_INFO   = "https://www.jma.go.jp/bosai/information/data/typhoon.json";
const JMA_SPEC   = id => `https://www.jma.go.jp/bosai/typhoon/data/${id}/specifications.json`;
const OM_JMA = "https://api.open-meteo.com/v1/jma";
const OM_STD = "https://api.open-meteo.com/v1/forecast";
const COAST_URL = "https://raw.githubusercontent.com/martynafford/natural-earth-geojson/master/50m/physical/ne_50m_land.json";

async function getJSON(url, ms=12000){ const ctl=new AbortController(); const tid=setTimeout(()=>ctl.abort(), ms);
  try{ const r=await fetch(url,{cache:"no-store",signal:ctl.signal}); if(!r.ok) throw new Error(url+" "+r.status); return await r.json(); }
  finally{ clearTimeout(tid); } }

// ============ 解析 ============
function numbers(x,out){ if(typeof x==="number"&&isFinite(x)) out.push(x);
  else if(typeof x==="string"){const v=parseFloat(x); if(!isNaN(v)) out.push(v);}
  else if(Array.isArray(x)) x.forEach(v=>numbers(v,out));
  else if(x&&typeof x==="object") Object.values(x).forEach(v=>numbers(v,out)); }
function firstNum(x){ const a=[]; numbers(x,a); return a.length?a[0]:null; }
function toJa(v){ if(v==null) return null; if(typeof v==="string") return v;
  if(typeof v==="object"){ if(typeof v.ja==="string") return v.ja;
    for(const k of ["name","value","JST"]) if(k in v){const r=toJa(v[k]); if(r) return r;}
    for(const vv of Object.values(v)){const r=toJa(vv); if(r) return r;} }
  if(Array.isArray(v)&&v.length) return toJa(v[0]); return null; }
function parseLatLon(pos){ const a=[]; numbers(pos,a);
  const lat=a.find(n=>n>=0&&n<=60), lon=a.find(n=>n>=100&&n<=180); return [lat??null,lon??null]; }
function parseDt(v){ let s=null; if(typeof v==="string") s=v;
  else if(v&&typeof v==="object"){ s=v.JST||v.DateTime||v.dateTime||Object.values(v).find(x=>typeof x==="string"); }
  if(!s) return null; const d=new Date(s); return isNaN(d)?null:d; }
function radiusKm(warn){ if(!warn) return null; const nums=[];
  (function walk(x){ if(Array.isArray(x)) x.forEach(walk);
    else if(x&&typeof x==="object"){ for(const[k,v] of Object.entries(x)){
      if(k.toLowerCase()==="km"||k.toLowerCase()==="range") numbers(v,nums); else walk(v);} } })(warn);
  const f=nums.filter(n=>n>=1&&n<=3000); return f.length?Math.max(...f):null; }
function dig(d,...keys){ for(const k of keys){ if(d&&typeof d==="object"&&k in d) d=d[k]; else return null; } return d; }
function parseTyphoon(spec){ const name={ja:null,en:null}; let number=null; const points=[];
  (function visit(node){ if(Array.isArray(node)){node.forEach(visit);return;}
    if(node&&typeof node==="object"){
      if("name" in node && name.ja===null && name.en===null){ const nm=node.name;
        if(nm&&typeof nm==="object"){ name.ja=nm.ja||name.ja; name.en=nm.en||name.en; } }
      if("number" in node && number===null){ const n=node.number; number=typeof n==="string"?n:toJa(n); }
      if("position" in node){ const [lat,lon]=parseLatLon(node.position);
        if(lat!=null&&lon!=null){ points.push({ dt:parseDt(node.validtime||node.validTime), lat, lon,
          pressure:firstNum(node.pressure),
          wind:firstNum(dig(node,"maximumWind","sustained","m/s"))??firstNum(dig(node,"maximumWind","sustained")),
          gust:firstNum(dig(node,"maximumWind","gust","m/s"))??firstNum(dig(node,"maximumWind","gust")),
          stormKm:radiusKm(node.stormWarning), galeKm:radiusKm(node.galeWarning),
          circleKm:radiusKm(node.probabilityCircle||node.forecastCircle) }); } }
      Object.values(node).forEach(visit);
    } })(spec);
  points.sort((a,b)=>{ if(!a.dt) return 1; if(!b.dt) return -1; return a.dt-b.dt; });
  const uniq=[]; for(const p of points){ const q=uniq[uniq.length-1];
    if(q&&q.dt&&p.dt&&+q.dt===+p.dt&&Math.abs(q.lat-p.lat)<1e-6&&Math.abs(q.lon-p.lon)<1e-6) continue; uniq.push(p); }
  return {name,number,points:uniq}; }
async function getActiveIds(){
  try{ const ids=[]; (function w(x){ if(typeof x==="string"&&x.startsWith("TC")) ids.push(x);
        else if(Array.isArray(x)) x.forEach(w); else if(x&&typeof x==="object") Object.values(x).forEach(w);
      })(await getJSON(JMA_TARGET)); const out=[...new Set(ids)]; if(out.length) return out; }catch(e){}
  try{ const info=await getJSON(JMA_INFO); const now=Date.now(); const out=[];
    for(const it of info){ const dt=parseDt(it.reportDatetime);
      if(it.eventId&&dt&&(now-dt)<48*3600e3&&!out.includes(it.eventId)) out.push(it.eventId); } return out;
  }catch(e){ return []; } }
async function getReportDt(id){ try{ const info=await getJSON(JMA_INFO);
  const m=info.filter(i=>i.eventId===id); if(m.length) return parseDt(m[m.length-1].reportDatetime); }catch(e){} return null; }

// ============ 投影 ============
const HEADER_H=58, MAP=[40,88,960,902];
function computeExtent(t){ let[lo0,lo1]=DEFAULT_LON,[la0,la1]=DEFAULT_LAT;
  for(const p of t.points){ lo0=Math.min(lo0,p.lon-3);lo1=Math.max(lo1,p.lon+3);
    la0=Math.min(la0,p.lat-3);la1=Math.max(la1,p.lat+3);} return [lo0,lo1,la0,la1]; }
function makeProj(ext){ const[lo0,lo1,la0,la1]=ext; const latc=(la0+la1)/2, cos=Math.cos(latc*Math.PI/180);
  const dataW=(lo1-lo0)*cos, dataH=(la1-la0); const boxW=MAP[2]-MAP[0], boxH=MAP[3]-MAP[1];
  const s=Math.min(boxW/dataW, boxH/dataH); const offX=MAP[0]+(boxW-dataW*s)/2, offY=MAP[1]+(boxH-dataH*s)/2;
  return { ext,cos,s, xy:(lon,lat)=>[offX+(lon-lo0)*cos*s, offY+(la1-lat)*s],
    inv:(x,y)=>[lo0+(x-offX)/(cos*s), la1-(y-offY)/s] }; }
function gridAxes(ext){ const[lo0,lo1,la0,la1]=ext; const step=Math.max(0.5,(lo1-lo0)/18);
  const lons=[],lats=[]; for(let x=lo0+step/2;x<lo1;x+=step) lons.push(x);
  for(let y=la0+step/2;y<la1;y+=step) lats.push(y); return {lons,lats,step}; }
function geoCircle(lon,lat,km,n=120){ const out=[]; for(let i=0;i<=n;i++){ const a=2*Math.PI*i/n;
  out.push([lon+(km/(111*Math.cos(lat*Math.PI/180)))*Math.sin(a), lat+(km/111)*Math.cos(a)]); } return out; }
function polyPath(ctx,pts,proj){ ctx.beginPath(); pts.forEach((pp,i)=>{ const[x,y]=proj.xy(pp[0],pp[1]); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); }
// 暴風警戒域：円群＋区間補間円(カプセル)の和集合の輪郭を、マーチングスクエア法で抽出。
// 凸包と違い、進路がカーブしても各予報円の外周を順になぞる（連続する円の外周が接する）。
function stormWarningEnvelope(circles,N=200,tsteps=24){
  circles=circles.filter(c=>c[2]&&c[2]>0); if(!circles.length) return null;
  const lat0=circles.reduce((s,c)=>s+c[1],0)/circles.length, kx=111*Math.cos(lat0*Math.PI/180);
  const cs=circles.map(([lon,lat,r])=>[lon*kx,lat*111,r]);
  const disks=cs.slice();
  for(let i=0;i<cs.length-1;i++){ const[x0,y0,r0]=cs[i],[x1,y1,r1]=cs[i+1];
    for(let k=1;k<tsteps;k++){ const t=k/tsteps; disks.push([x0+(x1-x0)*t,y0+(y1-y0)*t,r0+(r1-r0)*t]); } }
  let minx=Infinity,maxx=-Infinity,miny=Infinity,maxy=-Infinity;
  for(const[x,y,r] of disks){ minx=Math.min(minx,x-r);maxx=Math.max(maxx,x+r);miny=Math.min(miny,y-r);maxy=Math.max(maxy,y+r); }
  const pad=0.05*Math.max(maxx-minx,maxy-miny)+1; minx-=pad;maxx+=pad;miny-=pad;maxy+=pad;
  const dx=(maxx-minx)/(N-1), dy=(maxy-miny)/(N-1);
  const f=[]; for(let j=0;j<N;j++){ const row=new Float64Array(N); const yy=miny+j*dy;
    for(let i=0;i<N;i++){ const xx=minx+i*dx; let m=1e12;
      for(const[cx,cy,r] of disks){ const d=(xx-cx)*(xx-cx)+(yy-cy)*(yy-cy)-r*r; if(d<m)m=d; }
      row[i]=m; } f.push(row); }
  const segs=[], frac=(a,b)=>a/(a-b);
  for(let j=0;j<N-1;j++) for(let i=0;i<N-1;i++){
    const tl=f[j][i],tr=f[j][i+1],br=f[j+1][i+1],bl=f[j+1][i];
    let idx=(tl<=0?1:0)|(tr<=0?2:0)|(br<=0?4:0)|(bl<=0?8:0);
    if(idx===0||idx===15) continue;
    const Tp=[minx+(i+frac(tl,tr))*dx, miny+j*dy];
    const Rp=[minx+(i+1)*dx, miny+(j+frac(tr,br))*dy];
    const Bp=[minx+(i+frac(bl,br))*dx, miny+(j+1)*dy];
    const Lp=[minx+i*dx, miny+(j+frac(tl,bl))*dy];
    const ad=(a,b)=>segs.push([a,b]);
    switch(idx){
      case 1: ad(Lp,Tp);break; case 2: ad(Tp,Rp);break; case 3: ad(Lp,Rp);break;
      case 4: ad(Rp,Bp);break; case 5: ad(Lp,Tp);ad(Rp,Bp);break; case 6: ad(Tp,Bp);break;
      case 7: ad(Lp,Bp);break; case 8: ad(Bp,Lp);break; case 9: ad(Bp,Tp);break;
      case 10: ad(Tp,Rp);ad(Bp,Lp);break; case 11: ad(Bp,Rp);break; case 12: ad(Rp,Lp);break;
      case 13: ad(Rp,Tp);break; case 14: ad(Tp,Lp);break;
    }
  }
  if(!segs.length) return null;
  const key=p=>(Math.round(p[0]*1000))+","+(Math.round(p[1]*1000));
  const adj=new Map(), pt=new Map();
  for(const[a,b] of segs){ const ka=key(a),kb=key(b); pt.set(ka,a);pt.set(kb,b);
    (adj.get(ka)||adj.set(ka,[]).get(ka)).push(kb); (adj.get(kb)||adj.set(kb,[]).get(kb)).push(ka); }
  const used=new Set(); let best=null;
  for(const sk of adj.keys()){ if(used.has(sk)) continue;
    const loop=[]; let cur=sk, prev=null, steps=0;
    while(cur && steps<adj.size*2){ loop.push(pt.get(cur)); used.add(cur);
      let nxt=null; for(const nb of (adj.get(cur)||[])){ if(nb!==prev && !used.has(nb)){ nxt=nb; break; } }
      if(!nxt) break; prev=cur; cur=nxt; steps++; }
    if(!best || loop.length>best.length) best=loop; }
  if(!best || best.length<3) return null;
  best.push(best[0]);
  return best.map(([x,y])=>[x/kx, y/111]);
}
function hourLabel(p,base){ if(!p.dt||!base) return ""; const h=Math.round((p.dt-base)/3600e3); return h<=0?"NOW":("+"+h+"h"); }

// ============ 風カラー（青→赤・海を濃く） ============
const WIND_STOPS=[[0,"#4a72b0"],[30,"#61a6e0"],[60,"#ccf2ff"]];
function hexRGB(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function windColor(v){ if(v<=WIND_STOPS[0][0]) return hexRGB(WIND_STOPS[0][1]);
  for(let i=1;i<WIND_STOPS.length;i++){ if(v<=WIND_STOPS[i][0]){ const[a,ca]=WIND_STOPS[i-1],[b,cb]=WIND_STOPS[i];
    const f=(v-a)/(b-a), r1=hexRGB(ca), r2=hexRGB(cb);
    return [r1[0]+(r2[0]-r1[0])*f, r1[1]+(r2[1]-r1[1])*f, r1[2]+(r2[2]-r1[2])*f]; } }
  return hexRGB(WIND_STOPS[WIND_STOPS.length-1][1]); }
function colorFor(v){ return windColor(tOf(v)*60); }
const LINE_STOPS=[[0,"#bcd6ff"],[0.2,"#7fb0ff"],[0.4,"#b79bff"],[0.6,"#ff9ec0"],[0.8,"#ff5a5a"],[1.0,"#ff2424"]];
function lerpC(ca,cb,f){ const a=hexRGB(ca),b=hexRGB(cb); return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f]; }
function streamColor(v){ const f=Math.min(1,Math.max(0,v/NORM_MAX));
  for(let i=1;i<LINE_STOPS.length;i++){ if(f<=LINE_STOPS[i][0]){ const[pa,ca]=LINE_STOPS[i-1],[pb,cb]=LINE_STOPS[i];
    const c=lerpC(ca,cb,(f-pa)/(pb-pa)); return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; } }
  return LINE_STOPS[LINE_STOPS.length-1][1]; }
function windAnchors(now){ let vmax=now.wind,r25=now.stormKm,r15=now.galeKm;
  if(vmax==null) vmax=(r25||r15)?30:null; if(vmax==null&&!r15&&!r25) return null; if(vmax==null) vmax=20;
  let rmw=r25?Math.min(70,Math.max(15,0.35*r25)):(r15?Math.min(60,Math.max(15,0.20*r15)):40);
  const vpk=Math.max(vmax, r25?26:(r15?16:vmax)); const xs=[0,rmw],ys=[6,vpk]; let last=rmw;
  if(r25&&r25>last){xs.push(r25);ys.push(25);last=r25;} if(r15&&r15>last){xs.push(r15);ys.push(15);last=r15;}
  let base=r15||r25||rmw*3, rout=r15?base*1.45:base*1.8; if(rout<=last) rout=last*1.3; xs.push(rout);ys.push(0);
  return {xs,ys,rout}; }
function windAt(r,xs,ys){ if(r<=xs[0]) return ys[0];
  for(let i=1;i<xs.length;i++){ if(r<=xs[i]){ const f=(r-xs[i-1])/(xs[i]-xs[i-1]); return ys[i-1]+(ys[i]-ys[i-1])*f; } } return 0; }

// ============ 風グリッド ============
let LAST_WIND_ERR="";
async function fetchWindGrid(ext){
  LAST_WIND_ERR="";
  try{
    const {lons,lats}=gridAxes(ext); const pts=[];
    for(const la of lats) for(const lo of lons) pts.push([la,lo]);
    const results=[];
    for(let c=0;c<pts.length;c+=50){ const chunk=pts.slice(c,c+50);
      const la=chunk.map(p=>p[0].toFixed(3)).join(","), lo=chunk.map(p=>p[1].toFixed(3)).join(",");
      const q=`?latitude=${la}&longitude=${lo}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`;
      let data;
      try{ data=await getJSON(OM_JMA+q, 25000); }
      catch(e1){ try{ data=await getJSON(OM_STD+q, 25000); }
        catch(e2){ LAST_WIND_ERR=(e2&&e2.message)?e2.message:String(e2); throw e2; } }
      if(Array.isArray(data)) results.push(...data); else results.push(data);
    }
    const nlon=lons.length,nlat=lats.length;
    const spd=Array.from({length:nlat},()=>new Array(nlon).fill(NaN));
    const U=Array.from({length:nlat},()=>new Array(nlon).fill(0));
    const V=Array.from({length:nlat},()=>new Array(nlon).fill(0));
    let cnt=0;
    results.forEach((res,n)=>{ const cur=(res&&res.current)||{}; const j=Math.floor(n/nlon), i=n%nlon;
      if(j<nlat&&i<nlon){ const sp=cur.wind_speed_10m, di=cur.wind_direction_10m;
        if(sp!=null){ spd[j][i]=sp; cnt++; const rad=di*Math.PI/180; U[j][i]=-sp*Math.sin(rad); V[j][i]=-sp*Math.cos(rad); } } });
    if(!cnt){ if(!LAST_WIND_ERR) LAST_WIND_ERR="応答に風データなし"; return null; }
    let sum=0,k=0; for(let j=0;j<nlat;j++)for(let i=0;i<nlon;i++) if(!isNaN(spd[j][i])){sum+=spd[j][i];k++;}
    const mean=k?sum/k:0; for(let j=0;j<nlat;j++)for(let i=0;i<nlon;i++) if(isNaN(spd[j][i])) spd[j][i]=mean;
    return {lons,lats,U,V,spd};
  }catch(e){ if(!LAST_WIND_ERR) LAST_WIND_ERR=(e&&e.message)?e.message:String(e); console.warn("wind fetch failed",e); return null; }
}
function synthWindGrid(ext,now){ const {lons,lats}=gridAxes(ext); const nlon=lons.length,nlat=lats.length;
  const a=now?windAnchors(now):null; const spd=[],U=[],V=[];
  for(let j=0;j<nlat;j++){ spd.push([]);U.push([]);V.push([]);
    for(let i=0;i<nlon;i++){ const lon=lons[i],lat=lats[j];
      const X=(lon-138)/2.5, Y=(lat-37)/2.5;
      const s1=Math.cos(1.1*X+0.7*Y), s2=Math.sin(0.8*X-1.0*Y), s3=Math.sin(1.6*X+0.5)*Math.cos(1.3*Y-0.4);
      let u=-(1.5*0.7*s1+1.2*1.0*s2+0.9*1.3*s3)*6.0+5.0;
      let v=(1.5*1.1*s1-1.2*0.8*s2+0.9*1.6*s3)*6.0+1.0;
      if(a&&now){ const coslat=Math.cos(now.lat*Math.PI/180);
        const dx=(lon-now.lon)*111*coslat, dy=(lat-now.lat)*111, r=Math.hypot(dx,dy);
        const vt=windAt(r,a.xs,a.ys), ang=Math.atan2(dy,dx);
        u+=vt*(-Math.sin(ang))-0.15*vt*Math.cos(ang); v+=vt*Math.cos(ang)-0.15*vt*Math.sin(ang); }
      U[j].push(u);V[j].push(v);spd[j].push(Math.hypot(u,v)); } }
  return {lons,lats,U,V,spd}; }

function drawWindField(ctx,proj,grid){
  const {lons,lats,spd}=grid; const nlon=lons.length,nlat=lats.length;
  const x0=MAP[0],y0=MAP[1],w=MAP[2]-MAP[0],h=MAP[3]-MAP[1];
  const lo0=lons[0],lo1=lons[nlon-1],la0=lats[0],la1=lats[nlat-1];
  const off=document.createElement("canvas"); off.width=w; off.height=h;
  const octx=off.getContext("2d"); const img=octx.createImageData(w,h); const d=img.data; const step=2;
  for(let py=0;py<h;py+=step){ for(let px=0;px<w;px+=step){
    const [lon,lat]=proj.inv(x0+px,y0+py);
    const fi=(lon-lo0)/(lo1-lo0)*(nlon-1), fj=(lat-la0)/(la1-la0)*(nlat-1);
    let r,g,b,a;
    if(fi<0||fi>nlon-1||fj<0||fj>nlat-1){ a=0;r=g=b=0; }
    else{ const i0=Math.floor(fi),j0=Math.floor(fj),i1=Math.min(i0+1,nlon-1),j1=Math.min(j0+1,nlat-1);
      const tx=fi-i0,ty=fj-j0;
      const v=spd[j0][i0]*(1-tx)*(1-ty)+spd[j0][i1]*tx*(1-ty)+spd[j1][i0]*(1-tx)*ty+spd[j1][i1]*tx*ty;
      const c=colorFor(v); r=c[0]|0;g=c[1]|0;b=c[2]|0;a=115; }
    for(let dy=0;dy<step&&py+dy<h;dy++) for(let dx=0;dx<step&&px+dx<w;dx++){
      const idx=((py+dy)*w+(px+dx))*4; d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=a; }

function sampleUV(grid,lon,lat){ const {lons,lats,U,V}=grid; const nlon=lons.length,nlat=lats.length;
  const lo0=lons[0],lo1=lons[nlon-1],la0=lats[0],la1=lats[nlat-1];
  const fi=(lon-lo0)/(lo1-lo0)*(nlon-1), fj=(lat-la0)/(la1-la0)*(nlat-1);
  if(fi<0||fi>nlon-1||fj<0||fj>nlat-1) return null;
  const i0=Math.floor(fi),j0=Math.floor(fj),i1=Math.min(i0+1,nlon-1),j1=Math.min(j0+1,nlat-1);
  const tx=fi-i0,ty=fj-j0;
  const u=U[j0][i0]*(1-tx)*(1-ty)+U[j0][i1]*tx*(1-ty)+U[j1][i0]*(1-tx)*ty+U[j1][i1]*tx*ty;
  const v=V[j0][i0]*(1-tx)*(1-ty)+V[j0][i1]*tx*(1-ty)+V[j1][i0]*(1-tx)*ty+V[j1][i1]*tx*ty;
  return [u,v]; }
function drawStreamlines(ctx,proj,grid){
  const {lons,lats}=grid;
  const stepKm=8, BASE_KM=195, SLOPE=11.0, MAX_KM=640, MAX_STEPS=88; const paths=[];
  const lo0=lons[0], lo1=lons[lons.length-1], la0=lats[0], la1=lats[lats.length-1];
  const NCOL=40, seedStep=(lo1-lo0)/NCOL, nrows=Math.max(1,Math.round((la1-la0)/seedStep));
  const jit=(c,r,a,b)=>{ const h=Math.sin(c*a+r*b)*43758.5453; return (h-Math.floor(h))-0.5; };
  for(let r=0;r<nrows;r++) for(let c=0;c<NCOL;c++){
    const slon=lo0+(c+0.5+jit(c,r,12.9898,78.233)*0.8)*seedStep;
    const slat=la0+(r+0.5+jit(c,r,39.346,11.135)*0.8)*seedStep;
    let cur=[slon,slat]; const seed=sampleUV(grid,cur[0],cur[1]); if(!seed) continue;
    const sp0=Math.hypot(seed[0],seed[1]); if(sp0<0.3) continue;
    const lengthKm=Math.min(MAX_KM,BASE_KM+SLOPE*sp0);   // 基準長+風速比例（弱風でも長い）
    const nSteps=Math.max(1,Math.min(MAX_STEPS,Math.round(lengthKm/stepKm)));
    const pa=[];
    for(let k=0;k<=nSteps;k++){ const uv=sampleUV(grid,cur[0],cur[1]); if(!uv) break;
      const sp=Math.hypot(uv[0],uv[1]); pa.push({lon:cur[0],lat:cur[1],sp});
      if(sp<0.2) break; const coslat=Math.cos(cur[1]*Math.PI/180);
      cur=[cur[0]+(stepKm/(111*coslat))*(uv[0]/sp), cur[1]+(stepKm/111)*(uv[1]/sp)]; }
    if(pa.length>=2) paths.push(pa);
  }
  const wOf=sp=>0.45+0.8*Math.min(1,sp/30);
  ctx.lineCap="round"; ctx.lineJoin="round";
  // 本体：尾は細く淡く→先端はくっきり（テーパー）。暗いフチは無し。
  for(const pa of paths){ const nseg=Math.max(1,pa.length-1);
    for(let i=0;i<pa.length-1;i++){ const a=pa[i],b=pa[i+1];
      const taper=0.42+0.58*((i+1)/nseg);
      const c=colorFor(a.sp); ctx.globalAlpha=taper;
      ctx.strokeStyle=`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; ctx.lineWidth=wOf(a.sp)*(0.4+0.6*taper);
      const A=proj.xy(a.lon,a.lat),B=proj.xy(b.lon,b.lat);
      ctx.beginPath();ctx.moveTo(A[0],A[1]);ctx.lineTo(B[0],B[1]);ctx.stroke(); }
    ctx.globalAlpha=1;
    if(SHOW_ARROWHEADS){
      const e=pa[pa.length-1], q=pa[pa.length-2];
      const A=proj.xy(q.lon,q.lat),B=proj.xy(e.lon,e.lat); const ang=Math.atan2(B[1]-A[1],B[0]-A[0]), hl=6;
      const c=colorFor(q.sp); ctx.strokeStyle=`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; ctx.lineWidth=wOf(q.sp);
      ctx.beginPath(); ctx.moveTo(B[0]-hl*Math.cos(ang-0.5),B[1]-hl*Math.sin(ang-0.5));
      ctx.lineTo(B[0],B[1]); ctx.lineTo(B[0]-hl*Math.cos(ang+0.5),B[1]-hl*Math.sin(ang+0.5)); ctx.stroke();
    }
  }
}
function drawWindScale(ctx){ const x0=340,x1=660,yb=914,h=9;
  for(let x=x0;x<x1;x++){ const t=(x-x0)/(x1-x0),c=windColor(t*60); ctx.fillStyle=`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; ctx.fillRect(x,yb,1,h); }

function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function star(ctx,cx,cy,r,color){ ctx.beginPath();
  for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, rad=(i%2)?r*0.45:r;
    const x=cx+rad*Math.cos(a),y=cy+rad*Math.sin(a); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle="#fff"; ctx.stroke(); }

      ctx.beginPath();ctx.moveTo(60,y-6);ctx.lineTo(72,y+6);ctx.moveTo(72,y-6);ctx.lineTo(60,y+6);ctx.stroke();

function iso(d){ const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

// 海岸線（精細）取得＋日本のみ抽出（朝鮮半島・大陸を除外）
let COAST_CACHE=null;
function chaikin(ring,iters){ let pts=ring.map(p=>[p[0],p[1]]);
  for(let k=0;k<iters;k++){ const nw=[pts[0]];
    for(let i=0;i<pts.length-1;i++){ const p=pts[i],q=pts[i+1];
      nw.push([0.75*p[0]+0.25*q[0],0.75*p[1]+0.25*q[1]]);
      nw.push([0.25*p[0]+0.75*q[0],0.25*p[1]+0.75*q[1]]); }
    nw.push(pts[pts.length-1]); pts=nw; } return pts; }
function ringJapan(ring){ let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
  for(const p of ring){ if(p[0]<mnx)mnx=p[0]; if(p[0]>mxx)mxx=p[0]; if(p[1]<mny)mny=p[1]; if(p[1]>mxy)mxy=p[1]; }
  return mnx>=127&&mxx<=146&&mny>=29&&mxy<=46&&(mxx-mnx)<20&&(mxy-mny)<20; }
async function loadCoast(){ if(COAST_CACHE) return COAST_CACHE;
  try{ const geo=await getJSON(COAST_URL); const polys=[];
    for(const ft of geo.features||[]){ const gm=ft.geometry||{}; let rings=[];
      if(gm.type==="Polygon") rings=gm.coordinates; else if(gm.type==="MultiPolygon") rings=gm.coordinates.flat();
      for(const ring of rings){ if(ring&&ring.length>=4&&ringJapan(ring)) polys.push(ring); } }
    COAST_CACHE=polys.length?polys:COASTLINE.map(r=>chaikin(r,3)).filter(ringJapan); return COAST_CACHE;
  }catch(e){ console.warn("coast 50m failed",e); COAST_CACHE=COASTLINE.map(r=>chaikin(r,3)).filter(ringJapan); return COAST_CACHE; } }

function draw(t, reportDt, coastline, grid, opt={}){
  const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  ctx.clearRect(0,0,1000,1000); ctx.fillStyle="#000"; ctx.fillRect(0,0,1000,1000);
  const hasTy=!!opt.hasTy; const d=reportDt||new Date();

  // ヘッダ（エンジ色。TWBバッジは廃止。Toshima Weather Brief に白いグロー）

  ctx.save();
  ctx.shadowColor="rgba(255,255,255,0.9)"; ctx.shadowBlur=8;
  ctx.fillStyle="#ffffff"; ctx.font="bold 18px Arial,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText(BRAND_NAME,30,29);
  ctx.restore();
  const timeS = hasTy ? (iso(d)+" JST  (JMA)") : (iso(d)+" JST");
  ctx.fillStyle="#ecd6d8"; ctx.font="15px Arial,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle"; ctx.fillText(timeS,972,29);

  // 地図
  const ext=computeExtent(t), proj=makeProj(ext);
  ctx.save(); ctx.beginPath(); ctx.rect(MAP[0],MAP[1],MAP[2]-MAP[0],MAP[3]-MAP[1]); ctx.clip();
  ctx.fillStyle="#04102a"; ctx.fillRect(MAP[0],MAP[1],MAP[2]-MAP[0],MAP[3]-MAP[1]);
  if(grid){
    const vs=[]; for(const row of grid.spd) for(const v of row) if(isFinite(v)) vs.push(v);
    if(vs.length){ vs.sort((a,b)=>a-b); const p90=vs[Math.min(vs.length-1,Math.floor(vs.length*0.90))];
      NORM_MAX = Math.min(40, Math.max(5, p90)); }
    if(SHOW_WIND_FIELD) drawWindField(ctx,proj,grid); drawStreamlines(ctx,proj,grid); }
  // 陸地（海と別色・流線の上）
  ctx.strokeStyle="#9aa7b6"; ctx.lineWidth=1.0;
  for(const ring of (coastline||[])){ polyPath(ctx,ring,proj); ctx.closePath(); ctx.stroke(); }
  // グリッド

  const[lo0,lo1,la0,la1]=ext;
  for(let x=Math.ceil(lo0/5)*5;x<=lo1;x+=5){ const[px]=proj.xy(x,la0); ctx.beginPath();ctx.moveTo(px,MAP[1]);ctx.lineTo(px,MAP[3]);ctx.stroke();
    ctx.textAlign="center"; ctx.fillText(x+"°E",px,MAP[3]-3); }
  for(let y=Math.ceil(la0/5)*5;y<=la1;y+=5){ const[,py]=proj.xy(lo0,y); ctx.beginPath();ctx.moveTo(MAP[0],py);ctx.lineTo(MAP[2],py);ctx.stroke();

      ctx.setLineDash([]); polyPath(ctx,gc,proj); ctx.fillStyle="rgba(255,212,0,.20)"; ctx.fill();
      ctx.strokeStyle="#b89400"; ctx.lineWidth=1.4; polyPath(ctx,gc,proj); ctx.stroke(); }

      ctx.setLineDash([]); polyPath(ctx,sc,proj); ctx.fillStyle="rgba(232,17,45,.30)"; ctx.fill();
      ctx.strokeStyle="#b00018"; ctx.lineWidth=1.6; polyPath(ctx,sc,proj); ctx.stroke(); }
    // 暴風警戒域（予報円の外側を囲む赤の実線。視認性の主役）
    { const ec=[[now.lon,now.lat,Math.max(now.stormKm||0,60)]];
      for(const p of pts.slice(1)) if(p.circleKm) ec.push([p.lon,p.lat,p.circleKm]);
      if(ec.length>=2){ const env=stormWarningEnvelope(ec);

          ctx.strokeStyle="#f2ecc2"; ctx.lineWidth=2.6; polyPath(ctx,env,proj); ctx.stroke(); } } }

      ctx.setLineDash([]); ctx.strokeStyle="rgba(19,40,63,.5)"; ctx.lineWidth=3.0; polyPath(ctx,cc,proj); ctx.stroke();
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=1.8; ctx.setLineDash([6,5]); polyPath(ctx,cc,proj); ctx.stroke(); ctx.setLineDash([]); }

    // 実況（赤い×印）

      ctx.strokeStyle="#fff"; ctx.lineWidth=5.5;
      ctx.beginPath(); ctx.moveTo(x-9,y-9);ctx.lineTo(x+9,y+9);ctx.moveTo(x+9,y-9);ctx.lineTo(x-9,y+9); ctx.stroke();
      ctx.strokeStyle=C.now; ctx.lineWidth=3.4;
      ctx.beginPath(); ctx.moveTo(x-9,y-9);ctx.lineTo(x+9,y+9);ctx.moveTo(x+9,y-9);ctx.lineTo(x-9,y+9); ctx.stroke();
      ctx.fillStyle="#fff"; ctx.font="bold 18px Arial,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
      ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.lineWidth=3; ctx.strokeText("NOW",x+13,y+8); ctx.fillText("NOW",x+13,y+8); }
  }

  ctx.textAlign="right"; ctx.fillText("Generated "+iso(new Date()),960,972);
  ctx.textAlign="left"; ctx.font="11px Arial,sans-serif"; ctx.fillStyle="#828f9d";
  ctx.fillText("JMA = Japan Meteorological Agency, Japan's national weather service.    Open-Meteo = free open weather API serving the JMA model's wind data.",40,990);
  document.getElementById("save").disabled=false;
}

      try{ t=parseTyphoon(await getJSON(JMA_SPEC(id)));
        reportDt=(await getReportDt(id))||(t.points[0]&&t.points[0].dt)||null; hasTy=t.points.length>0; }catch(e){} }
    const ext=computeExtent(t); if(!reportDt) reportDt=new Date();
    setS("③ 風データ（JMAモデル）を取得中… 数十秒かかります","work");
    let grid=null; try{ grid=await fetchWindGrid(ext); }catch(e){ grid=null; }
    let realWind=!!grid;
    if(!grid){ grid=synthWindGrid(ext, hasTy?t.points[0]:null); }
    let mx=0,sm=0,n2=0; for(let j=0;j<grid.spd.length;j++)for(let i=0;i<grid.spd[j].length;i++){const v=grid.spd[j][i]; if(isFinite(v)){ if(v>mx)mx=v; sm+=v; n2++; }}
    const av=n2?sm/n2:0;
    setS("④ 海岸線を整形中…描画します","work");
    let coastline=null; try{ coastline=await coastP; }catch(e){ coastline=null; }
    draw(t, reportDt, coastline, grid, {hasTy});
    const wtxt = realWind ? `実データ：最大${mx.toFixed(0)}・平均${av.toFixed(1)} m/s` : `簡易表示（風取得失敗：${LAST_WIND_ERR||"不明"}）`;
    setS("✓ 作成完了（"+wtxt+"）。下の画像を確認し「画像を保存（PNG）」で保存できます。","ok");
    window.scrollTo({top: document.querySelector(".wrap").offsetTop-60, behavior:"smooth"});
  }catch(e){ setS("✕ エラー: "+(e&&e.message?e.message:e),"err"); }
  finally{ go.disabled=false; }
}
function save(){
  const cv=document.getElementById("cv");
  cv.toBlob(async (b)=>{
    if(!b) return;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
    const file = new File([b],"typhoon_status.png",{type:"image/png"});
    // iOS等：共有シートから「写真に保存」
    if(isIOS && navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:"Toshima Weather Brief"}); return; }
      catch(e){ if(e && e.name==="AbortError") return; /* 失敗時は下のフォールバックへ */ }
    }
    const url = URL.createObjectURL(b);
    // PC等：download属性で直接ダウンロード
    const a=document.createElement("a");
    if(("download" in a) && !isIOS){
      a.href=url; a.download="typhoon_status.png"; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),4000); return;
    }
    // 旧iOS等のフォールバック：画像を新規タブで開いて長押し保存
    const w=window.open();
    if(w){ w.document.title="typhoon_status.png";
      w.document.body.style.margin="0";
      w.document.body.innerHTML='<img src="'+url+'" style="width:100%;height:auto" alt="typhoon_status">'; }
    else { location.href=url; }
    setTimeout(()=>URL.revokeObjectURL(url),15000);
  },"image/png");
}
document.getElementById("go").addEventListener("click",run);
document.getElementById("save").addEventListener("click",save);
window.addEventListener("load",run);
</script>
